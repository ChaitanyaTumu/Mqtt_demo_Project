name: IoT Connectivity Verification Pipeline

# 1. Trigger the pipeline every time code is pushed to the main branch
on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  mqtt-integration-test:
    # 2. Spin up a fresh, clean Linux server in the cloud
    runs-on: ubuntu-latest

    steps:
    # 3. Download your code onto the server
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 4. Install Python
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    # 5. Install the required libraries
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 6. Execute the Verification Strategy
    - name: Run MQTT Integration Test
      run: |
        # Start the Pytest listener in the background (adding '&' puts it in the background)
        pytest -s test_telemetry.py &
        
        # Wait 2 seconds to ensure the listener is fully connected to the broker
        sleep 2
        
        # Fire the simulated bioreactor to publish the critical temperature
        python bio_reactor.py
        
        # Wait for the background Pytest job to finish its 10-second timer and run assertions
        wait
